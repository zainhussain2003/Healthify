name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build, Test (unit + integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: healthify
          POSTGRES_PASSWORD: Healthify2026
          POSTGRES_DB: healthify
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U healthify -d healthify"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: healthify
      DB_USER: healthify
      DB_PASSWORD: Healthify2026
      JWT_SECRET: ci-test-secret-not-for-production
      AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      AI_PROVIDER: gemini
      AI_MODEL: gemini-2.0-flash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build and run all tests
        working-directory: backend
        run: ./mvnw verify --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  frontend:
    name: Frontend — TypeScript check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: TypeScript type check
        working-directory: mobile
        run: npx tsc --noEmit
