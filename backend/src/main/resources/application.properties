spring.application.name=Healthify

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:healthify}
spring.datasource.username=${DB_USER:healthify}
spring.datasource.password=${DB_PASSWORD:Healthify2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:changeme-use-a-real-256-bit-secret-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AI
ai.provider=${AI_PROVIDER:openai}
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:gpt-4o-mini}
